name: Docker Image CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:

  build-and-test:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t soundowl .
    - name: List files
      run: ls -la
    - name: Run tests
      run: docker compose up -d db redis backend frontend
      env:
        MUSIC_DIR: './music/'
