name: Backend Contract

on:
  push:
    paths:
      - "api/**"
      - "backend-node/**"
      - "parts/**"
      - "sound_create/**"
      - "img/**"
      - "test_scripts/**"
      - ".github/workflows/backend-contract.yml"
      - "Dockerfile"
      - "docker-compose.yml"
  pull_request:
    paths:
      - "api/**"
      - "backend-node/**"
      - "parts/**"
      - "sound_create/**"
      - "img/**"
      - "test_scripts/**"
      - ".github/workflows/backend-contract.yml"
      - "Dockerfile"
      - "docker-compose.yml"

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Install test dependencies
        run: |
          npm ci --prefix frontend
          npm install --prefix backend-node

      - name: Run Node backend base unit tests
        run: npm test --prefix backend-node

      - name: Create fixture files and settings
        run: |
          mkdir -p test_scripts/fixtures/music/contract-fixture api/lock parts backend-node/config
          node test_scripts/fixtures/create_fixture_audio.js test_scripts/fixtures/music/contract-fixture
          cat > backend-node/config/settings.json <<'JSON'
          {
            "db_ip_address": "soundowl-db",
            "db_name": "sound",
            "db_user": "root",
            "db_pass": "sound",
            "redis_ip_address": "soundowl-redis",
            "sound_directory": "/music/contract-fixture",
            "exclusionPaths": "RECYCLE.BIN|JRiver Conversion Cache",
            "websocket_retry_count": "7",
            "websocket_retry_interval": "1234"
          }
          JSON

      - name: Start Node backend stack
        env:
          MUSIC_DIR: ${{ github.workspace }}/test_scripts/fixtures/music
        run: docker compose up -d db redis backend

      - name: Wait for database
        run: |
          for i in {1..60}; do
            if docker compose exec -T db mariadb-admin ping -uroot -psound --silent; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs db
          exit 1

      - name: Seed contract fixture data
        run: docker compose exec -T db mariadb -uroot -psound sound < test_scripts/fixtures/backend_contract_seed.sql

      - name: Wait for HTTP and WebSocket
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/get_setting.php > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run backend contract tests
        env:
          SOUNDOWL_CONTRACT_MODE: fixture
          SOUNDOWL_BASE_URL: http://127.0.0.1:3000
          SOUNDOWL_WS_URL: ws://127.0.0.1:8080/
        run: node --test test_scripts/backend_contract.test.js

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down -v
